# --- C\u1EA5u h\u00ECnh H2 Database ---
# URL k\u1EBFt n\u1ED1i (Database t\u00EAn l\u00E0 'dave', l\u01B0u tr\u00EAn RAM)
spring.datasource.url=jdbc:h2:mem:dave
# Driver (Th\u01B0\u1EDDng Spring Boot t\u1EF1 nh\u1EADn, nh\u01B0ng ghi cho ch\u1EAFc)
spring.datasource.driverClassName=org.h2.Driver
# Username/Password m\u1EB7c \u0111\u1ECBnh
spring.datasource.username=dave
spring.datasource.password=

# --- C\u1EA5u h\u00ECnh JPA / Hibernate ---
# Hi\u1EC7n c\u00E2u SQL ra console \u0111\u1EC3 debug cho d\u1EC5
spring.jpa.show-sql=true
# Quan tr\u1ECDng: B\u1EA3o Hibernate t\u1EF1 \u0111\u1ED9ng c\u1EADp nh\u1EADt c\u1EA5u tr\u00FAc b\u1EA3ng d\u1EF1a tr\u00EAn code Java
# (N\u1EBFu b\u1EA3ng ch\u01B0a c\u00F3 th\u00EC n\u00F3 t\u1EA1o m\u1EDBi, c\u00F3 r\u1ED3i th\u00EC n\u00F3 s\u1EEDa)
spring.jpa.hibernate.ddl-auto=update

# --- C\u1EA5u h\u00ECnh H2 Console (\u0111\u1EC3 v\u00E0o soi data tr\u00EAn tr\u00ECnh duy\u1EC7t) ---
spring.h2.console.enabled=true
# \u0110\u01B0\u1EDDng d\u1EABn truy c\u1EADp console (v\u00ED d\u1EE5: localhost:8080/h2-console)
spring.h2.console.path=/h2-console

# Tr\u00EC ho\u00E3n vi\u1EC7c n\u1EA1p d\u1EEF li\u1EC7u cho \u0111\u1EBFn khi Hibernate t\u1EA1o b\u1EA3ng xong
spring.jpa.defer-datasource-initialization=true